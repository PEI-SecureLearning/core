sonar.projectKey=PEI-SecureLearning_core
sonar.organization=pei-securelearning
sonar.projectName=SecureLearning
sonar.sourceEncoding=UTF-8

# Multi-module setup
sonar.modules=api,web,smtp

# API Module
api.sonar.projectName=SecureLearning API
api.sonar.projectBaseDir=./api
api.sonar.sources=src
api.sonar.tests=test
api.sonar.python.coverage.reportPaths=coverage.xml
api.sonar.coverage.exclusions=src/models/**,src/core/**,src/main.py
api.sonar.exclusions=**/__pycache__/**,**/*.pyc,api.egg-info/**

# Web Module
web.sonar.projectName=SecureLearning Web
web.sonar.projectBaseDir=./web
web.sonar.sources=src
web.sonar.tests=tests
web.sonar.exclusions=**/node_modules/**,dist/**,routeTree.gen.ts

# SMTP Module
smtp.sonar.projectName=SecureLearning SMTP
smtp.sonar.projectBaseDir=./smtp
smtp.sonar.sources=src
smtp.sonar.exclusions=**/__pycache__/**,**/*.pyc
