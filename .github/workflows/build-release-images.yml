name: "Build Release Images"

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - hotfix/**

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: api
            context: api
            image: securelearning-api
            target: prod
          - name: web
            context: web
            image: securelearning-web
            target: prod
          - name: smtp
            context: smtp
            image: securelearning-smtp

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute tags
        id: tags
        run: |
          set -euo pipefail
          IMAGE="${{ vars.DOCKERHUB_USERNAME }}/${{ matrix.image }}"
          SHA_TAG="$(git rev-parse --short HEAD)"
          {
            echo "image=$IMAGE"
            echo "sha_tag=$SHA_TAG"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          target: ${{ matrix.target || '' }}
          push: true
          tags: |
            ${{ steps.tags.outputs.image }}:latest
            ${{ steps.tags.outputs.image }}:${{ steps.tags.outputs.sha_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: ${{ matrix.name == 'web' && format('VITE_API_URL={0}\nVITE_KEYCLOAK_URL={1}\nVITE_BASE_PATH={2}\nVITE_WEB_URL={3}', secrets.VITE_API_URL, secrets.VITE_KEYCLOAK_URL, secrets.VITE_BASE_PATH, secrets.VITE_WEB_URL) || '' }}
