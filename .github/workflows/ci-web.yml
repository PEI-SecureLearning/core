name: "CI - Web"

on:
  push:
    branches: [dev]
    paths: [web/**]
  pull_request:
    branches: [dev]
    paths: [web/**]

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/securelearning-web

jobs:
  check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        id: lint
        run: npm run lint 2>&1 | tee lint-output.txt; exit ${PIPESTATUS[0]}
        continue-on-error: true

      - name: Upload lint log
        if: steps.lint.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: web-lint-log
          path: web/lint-output.txt

      - name: Lint summary
        if: steps.lint.outcome == 'failure' && hashFiles('web/lint-output.txt') != ''
        run: |
          SUMMARY=$(grep -oE '✖ [0-9]+ problems \([0-9]+ errors?, [0-9]+ warnings?\)' lint-output.txt | tail -1)
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          echo "### Lint: ${SUMMARY:-unknown}" >> $GITHUB_STEP_SUMMARY
          echo "[Full log]($RUN_URL)" >> $GITHUB_STEP_SUMMARY
          exit 1

      - name: Typecheck & Build
        run: npm run build


  build-and-push:
    needs: check
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: web
          target: prod
          push: true
          tags: ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL }}
            VITE_KEYCLOAK_URL=${{ secrets.VITE_KEYCLOAK_URL }}
            VITE_BASE_PATH=${{ secrets.VITE_BASE_PATH }}
            VITE_WEB_URL=${{ secrets.VITE_WEB_URL }}
