name: "CD-workflow"

on:
  push:
    branches:
      - deploy

jobs:
  build:
    runs-on: [self-hosted, linux, x64]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f

      - name: Create .env files from .env.example
        run: |
          bash scripts/copy-env-examples.sh

      - name: Build images with local Buildx cache
        env:
          DOCKER_BUILDKIT: 1
        run: |
          mkdir -p .buildx-cache .buildx-cache-new
          docker buildx bake \
            --file deployment/docker-compose.yml \
            --set '*.cache-from=type=local,src=.buildx-cache' \
            --set '*.cache-to=type=local,dest=.buildx-cache-new,mode=max' \
            --load
          rm -rf .buildx-cache
          mv .buildx-cache-new .buildx-cache

      - name: Rebuild and redeploy stack
        env:
          DOCKER_BUILDKIT: 1
        run: |
          docker compose --env-file deployment/.env -f deployment/docker-compose.yml down --remove-orphans
          docker compose --env-file deployment/.env -f deployment/docker-compose.yml up -d
