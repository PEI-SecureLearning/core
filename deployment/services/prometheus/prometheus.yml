global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: api
    static_configs:
      - targets: ['api:80']
    metrics_path: /metrics

  - job_name: postgres
    static_configs:
      - targets: ['postgres-exporter:9187']

  - job_name: mongodb
    static_configs:
      - targets: ['mongodb-exporter:9216']

  - job_name: rabbitmq
    static_configs:
      - targets: ['rabbitmq:15692']

  - job_name: keycloak
    static_configs:
      - targets: ['keycloak:9000']
    metrics_path: /metrics

  - job_name: nginx
    static_configs:
      - targets: ['nginx-exporter:9113']
