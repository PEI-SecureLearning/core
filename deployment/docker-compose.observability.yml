name: SecureLearning-obs

services:
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: sl-postgres-exporter
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?sslmode=disable"
    expose:
      - "9187"
    depends_on:
      db:
        condition: service_healthy

  mongodb-exporter:
    image: percona/mongodb_exporter:0.44
    container_name: sl-mongodb-exporter
    restart: unless-stopped
    command: --mongodb.uri=mongodb://${MONGO_ROOT_USER}:${MONGO_ROOT_PASSWORD}@mongo:27017/admin
    expose:
      - "9216"
    depends_on:
      mongo:
        condition: service_healthy

  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:latest
    container_name: sl-nginx-exporter
    restart: unless-stopped
    command: --nginx.scrape-uri=http://nginx:8080/stub_status
    expose:
      - "9113"
    depends_on:
      nginx:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:latest
    container_name: sl-prometheus
    restart: unless-stopped
    volumes:
      - ./services/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    expose:
      - "9090"
    depends_on:
      - api
      - postgres-exporter
      - mongodb-exporter
      - rabbitmq
      - keycloak
      - nginx-exporter

  grafana:
    image: grafana/grafana:latest
    container_name: sl-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_SERVER_ROOT_URL: "%(protocol)s://%(domain)s/grafana/"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./services/grafana/provisioning:/etc/grafana/provisioning:ro
    expose:
      - "3000"
    depends_on:
      - prometheus

volumes:
  prometheus_data:
  grafana_data:
