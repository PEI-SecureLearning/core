worker_processes     auto;
worker_rlimit_nofile 65535;

events {
    multi_accept       on;
    worker_connections 65535;
}

http {
    client_max_body_size 100M;
    resolver 127.0.0.11 ipv6=off valid=10s;

    # Use the incoming host port for upstream forwarded-port.
    # Examples:
    # - Host: mednat.ieeta.pt:9071 -> 9071
    # - Host: 127.0.0.1:8081      -> 8081
    map $http_host $forwarded_port {
        ~:(\d+)$ $1;
        default 443;
    }

    # Necessário para proxy_set_header Connection $connection_upgrade;
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    upstream frontends {
        zone frontends 64k;
        server frontend:80 resolve max_fails=3 fail_timeout=30s;
    }

    upstream apis {
        zone apis 64k;
        server api:80 resolve max_fails=3 fail_timeout=30s;
    }

    upstream keycloaks {
        zone keycloaks 64k;
        server keycloak:8080 resolve max_fails=3 fail_timeout=30s;
    }

    # Single host routing for mednat.ieeta.pt
    server {
        listen      8081 ssl;
        listen      [::]:8081 ssl;
        server_name mednat.ieeta.pt;

        ssl_certificate     /etc/nginx/certs/tls.crt;
        ssl_certificate_key /etc/nginx/certs/tls.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        proxy_buffer_size              128k;
        proxy_buffers                  4 256k;
        proxy_busy_buffers_size        256k;
        large_client_header_buffers    4 32k;

        # API on same host via /api
        location /api/ {
            proxy_pass http://apis;
            proxy_redirect off;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_cache_bypass $http_upgrade;
        }

        # Keycloak on same host via /kc
        location = /kc {
            return 301 /kc/;
        }
        location /kc/ {
            proxy_pass http://keycloaks;
            proxy_redirect off;
            proxy_intercept_errors off;
            proxy_pass_request_headers on;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $http_host;
            proxy_set_header X-Forwarded-Prefix /kc;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Forwarded-Port $forwarded_port;
        }

        location = /app {
            return 301 /;
        }

        location ~ ^/app/(.*)$ {
            return 301 /$1;
        }

        # Asset files must never fallback to index.html.
        location /assets/ {
            proxy_pass http://frontends;
            proxy_redirect off;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_cache_bypass $http_upgrade;
        }

        # App routes fallback to index.html.
        location / {
            proxy_pass http://frontends;
            proxy_redirect off;
            proxy_intercept_errors on;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_cache_bypass $http_upgrade;
        }
    }
}
