name: SecureLearning-dev

services:
  db:
    image: postgres:18-alpine
    container_name: sl-db-dev
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - db_runtime_data:/var/lib/postgresql
      - db_data:/var/lib/postgresql/data
      - ./services/db/init.sql:/docker-entrypoint-initdb.d/init-dbs.sql

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  mongo:
    image: mongo:4.4.6
    container_name: sl-mongo-dev
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DB}
      MONGO_USER: ${MONGO_USER}
      MONGO_PASSWORD: ${MONGO_PASSWORD}
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
      - mongo_configdb_data:/data/configdb
      - ./services/mongo/init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
      - ./services/mongo/templates:/docker-entrypoint-initdb.d/templates:ro
    healthcheck:
      test:
        [
          "CMD",
          "mongo",
          "--quiet",
          "-u",
          "${MONGO_ROOT_USER}",
          "-p",
          "${MONGO_ROOT_PASSWORD}",
          "--authenticationDatabase",
          "admin",
          "--eval",
          "db.adminCommand('ping')",
        ]
      interval: 5s
      timeout: 5s
      retries: 5

  garage:
    image: dxflrs/garage:76592723deb9285a071320c40842f6be61e924fd
    container_name: sl-garage-dev
    command: /garage server --single-node --default-bucket
    environment:
      GARAGE_RPC_SECRET: ${GARAGE_RPC_SECRET}
      GARAGE_DEFAULT_ACCESS_KEY: ${GARAGE_ACCESS_KEY_ID}
      GARAGE_DEFAULT_SECRET_KEY: ${GARAGE_SECRET_ACCESS_KEY}
      GARAGE_DEFAULT_BUCKET: ${GARAGE_BUCKET_CONTENT}
    ports:
      - "3900:3900"
      - "3901:3901"
    volumes:
      - ./services/garage/garage.template.toml:/etc/garage.toml:ro
      - garage_data:/var/lib/garage
    healthcheck:
      test: ["CMD", "/garage", "-c", "/etc/garage.toml", "status"]
      interval: 15s
      timeout: 10s
      retries: 10

  rabbitmq:
    build:
      context: ./services/rabbitmq
      dockerfile: Dockerfile
    container_name: sl-rabbitmq-dev
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
      RABBITMQ_API_USER: ${RABBITMQ_API_USER}
      RABBITMQ_API_PASS: ${RABBITMQ_API_PASS}
      RABBITMQ_SMTP_USER: ${RABBITMQ_SMTP_USER}
      RABBITMQ_SMTP_PASS: ${RABBITMQ_SMTP_PASS}
      RABBITMQ_QUEUE: ${RABBITMQ_QUEUE}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  smtp:
    build:
      context: ../smtp
      dockerfile: Dockerfile
    container_name: sl-smtp-dev
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: ${RABBITMQ_SMTP_USER}
      RABBITMQ_PASS: ${RABBITMQ_SMTP_PASS}
      RABBITMQ_QUEUE: ${RABBITMQ_QUEUE}
      API_INTERNAL_URL: ${API_INTERNAL_URL}
      API_URL: ${API_URL}
    depends_on:
      rabbitmq:
        condition: service_healthy

  keycloak:
    image: quay.io/keycloak/keycloak:26.4
    command: start-dev --import-realm --health-enabled=true
    container_name: sl-keycloak-dev
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_IMPORT: /opt/keycloak/data/import/
      KC_HTTP_ACCESS_LOG_ENABLED: "true"
      KC_LOG_CATEGORY_ORG_KEYCLOAK_AUTHORIZATION: DEBUG
      KC_LOG_CATEGORY_ORG_KEYCLOAK_SERVICES_EMAIL: DEBUG
      KC_LOG_CATEGORY_ORG_KEYCLOAK_AUTHENTICATION: DEBUG
      KC_LOG_LEVEL: DEBUG
      KC_SPI_USER_PROVIDER_JPA_CASE_SENSITIVE: "true"
      KC_HTTP_ENABLED: true
      KC_HOSTNAME: localhost
      KC_DB: postgres
      QUARKUS_SMALLRYE_HEALTH_ENABLED: "true"
      QUARKUS_SMALLRYE_HEALTH_ROOT_PATH: "/health"
      KC_DB_URL: jdbc:postgresql://db:5432/keycloak
      KC_DB_USERNAME: ${POSTGRES_USER}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD}
      CLIENT_SECRET: ${CLIENT_SECRET}
      WEB_URL: ${WEB_URL}
      API_URL: ${API_URL}
      JAVA_OPTS_APPEND: "-Dkeycloak.migration.strategy=IGNORE_EXISTING"
      KC_DB_POOL_INITIAL_SIZE: 5
      KC_DB_POOL_MAX_SIZE: 10

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "exec 3<>/dev/tcp/127.0.0.1/9000; echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost:8080\\r\\nConnection: close\\r\\n\\r\\n' >&3;cat <&3 | grep -q '\"status\": \"UP\"' && exit 0 || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 3

    ports:
      - "8080:8080"

    depends_on:
      db:
        condition: service_healthy

    volumes:
      - ./services/keycloak/conf/keycloak.conf:/opt/keycloak/conf/keycloak.conf:ro
      - ./services/keycloak/themes:/opt/keycloak/themes:ro
      - ./services/keycloak/imports:/opt/keycloak/data/import:ro
      - ./services/keycloak/providers:/opt/keycloak/providers:ro
      - keycloak_data:/opt/keycloak/data

  api:
    build:
      context: ../api
      dockerfile: Dockerfile
      target: dev
    container_name: sl-api-dev
    environment:
      POSTGRES_SERVER: db
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      KEYCLOAK_URL: ${KEYCLOAK_INTERNAL_URL}
      KEYCLOAK_ISSUER_URL: ${KC_HOSTNAME_URL}
      CLIENT_SECRET: ${CLIENT_SECRET}
      MONGODB_URI: mongodb://${MONGO_USER}:${MONGO_PASSWORD}@mongo:27017/${MONGO_DB}?authSource=${MONGO_DB}
      MONGODB_DB: securelearning
      MONGODB_COLLECTION_TEMPLATES: templates
      FILE_STORAGE_BACKEND: ${FILE_STORAGE_BACKEND}
      GARAGE_S3_ENDPOINT: ${GARAGE_S3_ENDPOINT}
      GARAGE_S3_PUBLIC_ENDPOINT: ${GARAGE_S3_PUBLIC_ENDPOINT}
      GARAGE_S3_REGION: ${GARAGE_S3_REGION}
      GARAGE_ACCESS_KEY_ID: ${GARAGE_ACCESS_KEY_ID}
      GARAGE_SECRET_ACCESS_KEY: ${GARAGE_SECRET_ACCESS_KEY}
      GARAGE_FORCE_PATH_STYLE: ${GARAGE_FORCE_PATH_STYLE}
      GARAGE_BUCKET_CONTENT: ${GARAGE_BUCKET_CONTENT}
      GARAGE_BUCKET_LOGOS: ${GARAGE_BUCKET_LOGOS}
      GARAGE_CONTENT_PREFIX: ${GARAGE_CONTENT_PREFIX}
      GARAGE_LOGOS_PREFIX: ${GARAGE_LOGOS_PREFIX}
      WEB_URL: ${WEB_URL}
      API_URL: ${API_URL}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: ${RABBITMQ_API_USER}
      RABBITMQ_PASS: ${RABBITMQ_API_PASS}
      RABBITMQ_QUEUE: ${RABBITMQ_QUEUE}
      SMTP_PASSWORD: ${KC_SMTP_PASSWORD}
      SMTP_USER: ${KC_SMTP_USER}
      SMTP_FROM: ${KC_SMTP_FROM}
    ports:
      - "8000:8000"
    volumes:
      - ../api/src:/app/src:ro
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    depends_on:
      db:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      mongo:
        condition: service_healthy
      garage:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  frontend:
    build:
      context: ../web
      dockerfile: Dockerfile
      target: dev
    container_name: sl-frontend-dev
    environment:
      VITE_API_URL: ${API_URL}/api
      VITE_KEYCLOAK_URL: ${KC_HOSTNAME_URL}
      VITE_WEB_URL: ${WEB_URL}
      VITE_BASE_PATH: ${VITE_BASE_PATH}
    ports:
      - "5173:5173"
    volumes:
      - ../web:/app:rw
      - frontend_node_modules:/app/node_modules
    depends_on:
      api:
        condition: service_healthy

volumes:
  db_data:
  db_runtime_data:
  rabbitmq_data:
  mongo_data:
  mongo_configdb_data:
  garage_data:
  keycloak_data:
  frontend_node_modules:
