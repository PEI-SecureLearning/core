name: SecureLearning-obs-dev

services:
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: sl-postgres-exporter-dev
    restart: unless-stopped
    command:
      - "--collector.stat_statements"
      - "--collector.stat_statements.include_query"
      - "--collector.stat_statements.query_length=200"
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?sslmode=disable"
    expose:
      - "9187"
    depends_on:
      db:
        condition: service_healthy

  mongodb-exporter:
    image: percona/mongodb_exporter:0.44
    container_name: sl-mongodb-exporter-dev
    restart: unless-stopped
    command: --mongodb.uri=mongodb://${MONGO_ROOT_USER}:${MONGO_ROOT_PASSWORD}@mongo:27017/admin
    expose:
      - "9216"
    depends_on:
      mongo:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:latest
    container_name: sl-prometheus-dev
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./services/prometheus/prometheus.dev.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_dev_data:/prometheus
    depends_on:
      - api
      - postgres-exporter
      - mongodb-exporter
      - rabbitmq
      - keycloak

  grafana:
    image: grafana/grafana:latest
    container_name: sl-grafana-dev
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_SERVER_ROOT_URL: "http://localhost:3000"
    ports:
      - "3000:3000"
    volumes:
      - grafana_dev_data:/var/lib/grafana
      - ./services/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus

volumes:
  prometheus_dev_data:
  grafana_dev_data:
